name: Add Feed
description: Add an RSS feed to follow
title: "[feed] "
labels: ["feed"]
body:
  - type: input
    id: name
    attributes:
      label: Name
      description: Name for this feed
      placeholder: John Doe
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Feed URL
      description: RSS or Atom feed URL
      placeholder: https://example.com/feed.xml
    validations:
      required: true
