name: Add Recommendation
description: Add an article to recommended reading
title: "[rec] "
labels: ["recommendation"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: Link to the article
      placeholder: https://example.com/article
    validations:
      required: true
  - type: input
    id: note
    attributes:
      label: Note (optional)
      description: Why you're recommending this
      placeholder: Great explanation of X
    validations:
      required: false
